apiVersion: v1
kind: Namespace
metadata:
  name: monarch-tests
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hossein-controller
  namespace: monarch-tests
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hossein-controller
  namespace: monarch-tests
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["monarch.pytorch.org"]
    resources: ["monarchmeshes"]
    verbs: ["create", "get", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hossein-controller
  namespace: monarch-tests
subjects:
  - kind: ServiceAccount
    name: hossein-controller
    namespace: monarch-tests
roleRef:
  kind: Role
  name: hossein-controller
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Service
metadata:
  name: hossein-controller-svc
  namespace: monarch-tests
spec:
  clusterIP: None
  selector:
    app: hossein-controller
  ports:
    - name: lighthouse
      port: 1
      targetPort: 1
---
apiVersion: v1
kind: Pod
metadata:
  name: hossein-controller
  namespace: monarch-tests
  labels:
    app: hossein-controller
spec:
  hostname: hossein-controller
  subdomain: hossein-controller-svc
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node.kubernetes.io/instance-type
                operator: In
                values:
                  - BM.GPU.H100.8
                  - BM.GPU.A100-v2.8
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Equal"
      value: "present"
      effect: "NoSchedule"
  containers:
    - name: controller
      image: ocir.ap-sydney-1.oci.oraclecloud.com/iduyx1qnmway/meta-pytorch/monarch:hossein-ft-v1
      command: ["sleep"]
      args: ["infinity"]
      volumeMounts:
        - name: dshm
          mountPath: /dev/shm
  volumes:
    - name: dshm
      emptyDir:
        medium: Memory
        sizeLimit: 16Gi
  serviceAccountName: hossein-controller
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: monarch-client
  namespace: monarch-tests
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: monarch-client-binding
  namespace: monarch-tests
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: monarch-client-role
subjects:
  - kind: ServiceAccount
    name: monarch-client
    namespace: monarch-tests
